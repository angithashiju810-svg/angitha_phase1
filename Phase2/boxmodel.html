<!DOCTYPE html>
<html>
<head>
<title>Room Layout - Margin vs Padding</title>

<style>

body {
    font-family: Arial;
    background: #e0f7fa;
}

/* Title */
h1 {
    text-align: center;
    margin-bottom: 20px;
}

/* Room */
.room {
    background: #fff3e0;
    border: 4px solid #ff9800;
    margin: 30px;
    padding: 40px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* Furniture Base */
.sofa, .table, .chair {
    color: white;
    border-radius: 8px;
    transition: 0.3s;
    position: relative;
}

/* Hover effect */
.sofa:hover, .table:hover, .chair:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 15px rgba(0,0,0,0.3);
}

/* Labels */
.sofa::before,
.table::before,
.chair::before {
    content: "Padding Area";
    position: absolute;
    top: -20px;
    left: 10px;
    font-size: 12px;
    color: black;
}

/* Sofa */
.sofa {
    background: #8bc34a;
    margin: 40px;
    padding: 20px;
    border: 3px solid green;
}

/* Table */
.table {
    background: #03a9f4;
    margin: 10px;
    padding: 50px;
    border: 3px solid blue;
}

/* Chair */
.chair {
    background: #ff5722;
    margin: 50px;
    padding: 10px;
    border: 3px solid darkred;
}

/* Layout */
.flex {
    display: flex;
    gap: 20px;
    justify-content: center;
}

/* Extra label for margin */
.note {
    text-align: center;
    font-size: 14px;
    margin-top: 10px;
    color: #555;
}

</style>
</head>

<body>

<h1>🛋️ Room Design: Margin vs Padding</h1>

<div class="room">
    <h2>Sofa Example</h2>
    <div class="sofa">
        Big margin → space outside<br>
        Medium padding → inside comfort
    </div>
    <div class="note">👉 Space outside this box = Margin</div>
</div>

<div class="room">
    <h2>Table Example</h2>
    <div class="table">
        Small margin<br>
        Big padding → more usable space
    </div>
</div>

<div class="room">
    <h2>Comparison</h2>
    <div class="flex">
        <div class="chair">
            Chair<br>Big Margin<br>Small Padding
        </div>
        <div class="table">
            Table<br>Small Margin<br>Big Padding
        </div>
    </div>
</div>

</body>
</html>
