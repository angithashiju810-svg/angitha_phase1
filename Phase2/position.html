<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smartphone Showcase</title>

<style>

/* HEADER */
header{
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: linear-gradient(90deg, #1e3c72, #2a5298);
    color: white;
    text-align: center;
    padding: 15px;
    font-size: 28px;
    font-weight: bold;
}

/* PAGE TITLE */
.section-title{
    margin-top: 90px;
    text-align: center;
    font-size: 32px;
    color: #333;
    font-style: italic;
    border-bottom: 2px solid #ccc;
    padding-bottom: 10px;
}

/* CARD WRAPPER */
.container{
    display: flex;
    justify-content: center;
    margin-top: 30px;
}

/* CARD */
.laptop-card{
    position: relative;
    width: 320px;
    border-radius: 12px;
    border: 1px solid #ddd;
    padding: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    text-align: center;
    background: #fff;
}

/* IMAGE */
.laptop-card img{
    width: 100%;
    border-radius: 10px;
}

/* BADGE */
.tag{
    position: absolute;
    top: 10px;
    right: 10px;
    background: crimson;
    color: white;
    padding: 5px 10px;
    font-size: 14px;
    border-radius: 5px;
}

/* TITLE */
.laptop-title{
    font-size: 22px;
    color: #1e3c72;
    margin-top: 10px;
}

/* DESCRIPTION */
.laptop-desc{
    font-size: 16px;
    color: #555;
}

/* FOOTER OFFER */
.footer-offer{
    position: static;
    margin: 30px auto;
    width: fit-content;
    background: gold;
    padding: 10px 20px;
    font-weight: bold;
    border-radius: 8px;
}

</style>
</head>

<body>

<header>
    SMARTPHONE WORLD
</header>

<h2 class="section-title">Latest Smartphones</h2>

<div class="container">
    <div class="laptop-card">

        <div class="tag">HOT DEAL</div>

        <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">

        <div class="laptop-title">Samsung Galaxy S Series</div>

        <p class="laptop-desc">
            Premium smartphone with high performance camera, AMOLED display and fast processor.
        </p>

    </div>
</div>

<div class="footer-offer">
    🔥 Discount up to 75% Available Today!
</div>

</body>
</html>
