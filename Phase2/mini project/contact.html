<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

/* Navbar */
.navbar {
    background: #333;
    display: flex;
    justify-content: center;
    padding: 12px;
}

.navbar a {
    color: white;
    text-decoration: none;
    margin: 0 15px;
    padding: 8px 12px;
}

.navbar a:hover {
    background: palevioletred;
    border-radius: 5px;
}

/* Heading */
h1 {
    text-align: center;
    margin-top: 30px;
    color: #333;
}

/* Form Box */
.container {
    display: flex;
    justify-content: center;
    margin-top: 20px;
}

.box {
    width: 350px;
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

/* Inputs */
label {
    font-weight: bold;
    display: block;
    margin-top: 10px;
}

input, textarea {
    width: 100%;
    margin-top: 5px;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
    outline: none;
}

input:focus, textarea:focus {
    border-color: palevioletred;
}

/* Button */
button {
    background: palevioletred;
    color: white;
    padding: 12px;
    border: none;
    width: 100%;
    margin-top: 15px;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #d65a8f;
}
</style>

</head>
<body>

<div class="navbar">
    <a href="Home.html">Home</a>
    <a href="products.html">Products</a>
    <a href="contact.html">Contact</a>
</div>

<h1>Contact Us</h1>

<div class="container">
    <div class="box">
        <form>
            <label>Name</label>
            <input type="text" placeholder="Enter your name" required minlength="3">

            <label>Email</label>
            <input type="email" placeholder="Enter your email" required>

            <label>Message</label>
            <textarea placeholder="Write your message..." required minlength="5"></textarea>

            <button type="submit">Send Message</button>
        </form>
    </div>
</div>

</body>
</html>
