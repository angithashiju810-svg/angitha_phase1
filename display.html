<!DOCTYPE html>
<html>
<head>
<title>Social UI Display Demo</title>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: #e8f0fe;
    text-align: center;
}

/* Title */
h1 {
    color: #1a237e;
    padding: 20px;
}

/* SECTION */
.section {
    margin: 20px;
}

/* BLOCK → POSTS */
.post {
    display: block;
    background: white;
    width: 60%;
    margin: 10px auto;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    text-align: left;
}

/* INLINE → TAGS */
.tag {
    display: inline;
    background: #c8e6c9;
    padding: 5px 10px;
    margin: 3px;
    border-radius: 15px;
    font-size: 12px;
}

/* INLINE-BLOCK → USER CARDS */
.user-card {
    display: inline-block;
    width: 140px;
    background: #ffccbc;
    margin: 8px;
    padding: 10px;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.user-card:hover {
    transform: scale(1.05);
}

/* IMAGE */
img {
    width: 160px;
    height: 160px;
    border-radius: 10px;
    margin: 20px auto;
    display: block;
}

</style>
</head>

<body>

<h1>📱 Social Media Layout Demo</h1>

<div class="section">
    <h2>🧱 BLOCK (Posts)</h2>

    <div class="post">
        <h3>My First Post</h3>
        <p>This is a full-width block element like a social media post.</p>
    </div>

    <div class="post">
        <h3>Another Post</h3>
        <p>Each post takes full width → block display behavior.</p>
    </div>
</div>

<div class="section">
    <h2>🏷️ INLINE (Tags)</h2>

    <span class="tag">#html</span>
    <span class="tag">#css</span>
    <span class="tag">#webdesign</span>
    <span class="tag">#frontend</span>
</div>

<div class="section">
    <h2>👤 INLINE-BLOCK (User Cards)</h2>

    <div class="user-card">User 1</div>
    <div class="user-card">User 2</div>
    <div class="user-card">User 3</div>
    <div class="user-card">User 4</div>
</div>

<img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f" alt="Social Media Image">

</body>
</html>
