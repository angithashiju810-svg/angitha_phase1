<!DOCTYPE html>
<html>
<head>
<title>Jewellery - Wottagirl Store</title>

<link rel="stylesheet" href="Styles.css">

<style>

body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
}

/* Navbar */
.navbar {
    background-color: #d4af37;
    padding: 15px;
    text-align: center;
}

.navbar a {
    text-decoration: none;
    color: white;
    margin: 15px;
    font-weight: bold;
}

/* Header */
.header {
    text-align: center;
    padding: 40px;
    background-color: #fff8dc;
}

/* Product section */
.products {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    padding: 20px;
    gap: 20px;
}

.card {
    width: 250px;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 15px;
    text-align: center;
    background-color: white;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.card img {
    width: 200px;
    height: 200px;
    object-fit: cover;
}

.card h3 {
    margin: 10px 0;
    color: #333;
}

.price {
    color: green;
    font-weight: bold;
}

</style>

</head>

<body>

<div class="navbar">
    <a href="Home.html">Home</a>
    <a href="Jewellery.html">Jewellery</a>
    <a href="Contact.html">Contact Us</a>
</div>

<div class="header">
    <h1>Our Jewellery Collection</h1>
    <p>Shine like gold ✨</p>
</div>

<div class="products">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1601121141461-9d6647bca1ed">
        <h3>Gold Necklace</h3>
        <p class="price">₹5,999</p>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1617038260897-41a1f14a8ca0">
        <h3>Diamond Ring</h3>
        <p class="price">₹3,499</p>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1611652022419-a9419f74343d">
        <h3>Bracelet Set</h3>
        <p class="price">₹1,999</p>
    </div>

</div>

</body>
</html>
