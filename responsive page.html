<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Responsive Layout</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        background: #fff7ed;
    }

    /* Top bar */
    header {
        background: #0f172a;
        color: #fff;
        padding: 18px;
        text-align: center;
        font-size: 24px;
        letter-spacing: 1px;
    }

    /* main layout */
    .container {
        display: flex;
        min-height: 90vh;
    }

    /* sidebar */
    nav {
        width: 22%;
        background: #1e293b;
        color: white;
        padding: 20px;
    }

    nav h3 {
        margin-bottom: 15px;
        color: #fbbf24;
    }

    nav a {
        display: block;
        color: #e2e8f0;
        text-decoration: none;
        margin: 12px 0;
        padding: 8px;
        border-radius: 6px;
        transition: 0.3s;
    }

    nav a:hover {
        background: #334155;
    }

    /* main cards */
    section {
        flex: 1;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
        padding: 20px;
    }

    .card {
        background: #fde68a;
        padding: 25px;
        text-align: center;
        border-radius: 10px;
        transition: 0.3s;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .card:hover {
        transform: translateY(-5px);
        background: #fcd34d;
    }

    /* responsive */
    @media (max-width: 600px) {
        .container {
            flex-direction: column;
        }

        nav {
            width: 100%;
            text-align: center;
        }

        section {
            grid-template-columns: 1fr;
        }
    }

    @media (min-width: 601px) and (max-width: 900px) {
        section {
            grid-template-columns: repeat(2, 1fr);
        }
    }

</style>
</head>

<body>

<header>
    Modern Responsive Dashboard
</header>

<div class="container">

    <nav>
        <h3>Menu</h3>
        <a href="#">Home</a>
        <a href="#">Analytics</a>
        <a href="#">Messages</a>
        <a href="#">Settings</a>
    </nav>

    <section>
        <div class="card">Card 1</div>
        <div class="card">Card 2</div>
        <div class="card">Card 3</div>
        <div class="card">Card 4</div>
        <div class="card">Card 5</div>
        <div class="card">Card 6</div>
    </section>

</div>

</body>
</html>
