<!DOCTYPE html>
<html>
<body>

<p id="para">This is a paragraph</p>
<button onclick="changeStyle()">Change Style</button>

<script>
function changeStyle() {
    const p = document.getElementById("para");
    p.style.color = "red";
    p.style.fontSize = "20px";
}
</script>

</body>
</html>
